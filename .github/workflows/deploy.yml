name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with: { node-version: 22 }
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn install --immutable
        working-directory: site
      # Type-check the pipeline (tsc) AND the site (astro check) — B7.
      - run: yarn typecheck-all
      - run: yarn test
      # B3 (process-level): regenerate the published data and fail the build if
      # the committed site/src/data/*.json has drifted from a fresh pipeline run
      # (the build date aside), so stale/corrupt numbers can never ship.
      - run: yarn pipeline
      - run: yarn check-data-drift
      - run: yarn build
        working-directory: site
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
      - uses: actions/upload-pages-artifact@v5
        with: { path: site/dist }
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
