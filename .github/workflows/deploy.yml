name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with: { node-version: 22 }
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn install --immutable
        working-directory: site
      # Type-check the pipeline (tsc) AND the site (astro check) — B7.
      - run: yarn typecheck-all
      - run: yarn test
      # B3 (process-level): regenerate the published data and fail the build if
      # the committed site/src/data/*.json has drifted from a fresh pipeline run
      # (the build date aside), so stale/corrupt numbers can never ship.
      - run: yarn pipeline
      - run: yarn check-data-drift
      - run: yarn build
        working-directory: site
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
      # The guard against a silent placeholder-origin regression: if `site` in
      # astro.config.mjs ever drifts, the sitemap still builds but every URL in
      # it points at the wrong host, and nothing else would notice.
      - name: Verify crawl surface
        run: |
          test -f site/dist/sitemap-index.xml || { echo 'missing sitemap-index.xml'; exit 1; }
          test -f site/dist/robots.txt || { echo 'missing robots.txt'; exit 1; }
          grep -q 'https://jackuait.github.io/pyatkov-index/passport/' site/dist/sitemap-0.xml \
            || { echo 'sitemap-0.xml has no canonical passport URLs'; exit 1; }
      - uses: actions/upload-pages-artifact@v5
        with: { path: site/dist }
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
